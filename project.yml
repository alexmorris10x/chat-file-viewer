name: ChatFileViewer

options:
  minimumXcodeGenVersion: 2.42.0
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ChatFileViewer:
    type: application
    platform: iOS
    sources:
      - path: ChatFileViewer
        excludes:
          - Resources
      - path: ChatFileViewer/Resources/mermaid.min.txt
        buildPhase: resources
      - path: ChatFileViewer/Resources/marked.min.txt
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.10x.chatfileviewer
        PRODUCT_NAME: ChatFileViewer
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 98CDQPW36W
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Chat File Viewer
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - target: ChatFileViewerShare
        embed: true

  ChatFileViewerShare:
    type: app-extension
    platform: iOS
    sources:
      - path: ChatFileViewerShare
      - path: ChatFileViewer/Shared
      - path: ChatFileViewer/Resources/mermaid.min.txt
        buildPhase: resources
      - path: ChatFileViewer/Resources/marked.min.txt
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.10x.chatfileviewer.share
        PRODUCT_NAME: ChatFileViewerShare
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 98CDQPW36W
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ChatFileViewerShare/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES

  ChatFileViewerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChatFileViewerTests
      - path: ChatFileViewer/Shared
    dependencies:
      - target: ChatFileViewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.10x.chatfileviewer.tests
        GENERATE_INFOPLIST_FILE: YES

  ChatFileViewerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ChatFileViewerUITests
    dependencies:
      - target: ChatFileViewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.10x.chatfileviewer.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: ChatFileViewer

schemes:
  ChatFileViewer:
    build:
      targets:
        ChatFileViewer: all
        ChatFileViewerShare: all
    test:
      targets:
        - ChatFileViewerTests
        - ChatFileViewerUITests
      gatherCoverageData: false
    run:
      config: Debug
    archive:
      config: Release
